<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Modern Library Management</title>
    <meta name="description" content="A premium library management system for organizing and tracking books.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-book-open-reader"></i>
                    <span>Nexus</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="active"><a href="#" id="nav-dashboard"><i class="fa-solid fa-border-all"></i> Dashboard</a></li>
                    <li><a href="#" id="nav-books"><i class="fa-solid fa-book"></i> Catalog</a></li>
                    <li><a href="#" id="nav-users"><i class="fa-solid fa-users"></i> Members</a></li>
                    <li><a href="#" id="nav-settings"><i class="fa-solid fa-gear"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="user-profile">
                <div class="avatar"><i class="fa-solid fa-user-tie"></i></div>
                <div class="user-info">
                    <h4>Librarian</h4>
                    <p>Admin</p>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Search books by title, author, or genre...">
                </div>
                <div class="header-actions">
                    <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                    <button class="btn-primary" id="addBookBtn">
                        <i class="fa-solid fa-plus"></i> Add New Book
                    </button>
                </div>
            </header>

            <div class="dashboard-content">
                <!-- Stats Overview -->
                <section class="stats-overview">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(99, 102, 241, 0.1); color: #6366f1;">
                            <i class="fa-solid fa-swatchbook"></i>
                        </div>
                        <div class="stat-details">
                            <h3>Total Books</h3>
                            <h2 id="totalBooksCount">0</h2>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(34, 197, 94, 0.1); color: #22c55e;">
                            <i class="fa-solid fa-check-circle"></i>
                        </div>
                        <div class="stat-details">
                            <h3>Available</h3>
                            <h2 id="availableBooksCount">0</h2>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;">
                            <i class="fa-solid fa-clock-rotate-left"></i>
                        </div>
                        <div class="stat-details">
                            <h3>Borrowed</h3>
                            <h2 id="borrowedBooksCount">0</h2>
                        </div>
                    </div>
                </section>

                <!-- Library Catalog -->
                <section class="catalog-section">
                    <div class="section-header">
                        <h2>Library Catalog</h2>
                        <div class="view-toggles">
                            <button class="view-btn active" id="gridViewBtn"><i class="fa-solid fa-grid-2"></i> Grid</button>
                            <!-- List view button can be added here if needed -->
                        </div>
                    </div>
                    
                    <!-- Books Grid -->
                    <div class="books-grid" id="booksGrid">
                        <!-- Book cards will be injected here via JS -->
                    </div>
                    
                    <!-- Empty State -->
                    <div class="empty-state" id="emptyState" style="display: none;">
                        <i class="fa-solid fa-book-open"></i>
                        <h3>No books found</h3>
                        <p>Your catalog is empty or no books match your search.</p>
                        <button class="btn-secondary" onclick="document.getElementById('addBookBtn').click()">Add a Book</button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Add Book Modal -->
    <div class="modal-overlay" id="addBookModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Book</h2>
                <button class="close-modal" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="addBookForm">
                <div class="form-group">
                    <label for="bookTitle">Book Title</label>
                    <input type="text" id="bookTitle" required placeholder="e.g. The Great Gatsby">
                </div>
                <div class="form-group">
                    <label for="bookAuthor">Author</label>
                    <input type="text" id="bookAuthor" required placeholder="e.g. F. Scott Fitzgerald">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="bookGenre">Genre</label>
                        <select id="bookGenre" required>
                            <option value="" disabled selected>Select a genre...</option>
                            <option value="Fiction">Fiction</option>
                            <option value="Non-Fiction">Non-Fiction</option>
                            <option value="Sci-Fi">Science Fiction</option>
                            <option value="Fantasy">Fantasy</option>
                            <option value="Mystery">Mystery</option>
                            <option value="Biography">Biography</option>
                            <option value="Technology">Technology</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="bookYear">Published Year</label>
                        <input type="number" id="bookYear" required min="1000" max="2099" placeholder="e.g. 1925">
                    </div>
                </div>
                <div class="form-group">
                    <label for="bookCover">Cover Image URL (Optional)</label>
                    <input type="url" id="bookCover" placeholder="https://example.com/cover.jpg">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Add Book</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
